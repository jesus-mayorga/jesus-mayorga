<svg xmlns="http://www.w3.org/2000/svg" width="760" height="32" viewBox="0 0 760 32" role="img" aria-label="> Wake up, my projects are waiting for you.">
  <defs>
    <clipPath id="reveal">
      <rect x="0" y="0" width="0" height="32">
        <animate
          attributeName="width"
          values="0;550;550;0"
          keyTimes="0;0.55;0.9;1"
          dur="8s"
          repeatCount="indefinite"
        />
      </rect>
    </clipPath>
    <filter id="terminal-glow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="0.3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text
    x="8"
    y="23"
    fill="#78A870"
    font-family="'JetBrains Mono', 'Cascadia Mono', monospace"
    font-size="21"
    font-weight="400"
    clip-path="url(#reveal)"
    filter="url(#terminal-glow)"
  >&gt; Wake up, my projects are waiting for you.</text>

  <rect x="8" y="6" width="9" height="21" fill="#78A870" filter="url(#terminal-glow)">
    <animate
      attributeName="x"
      values="8;536;536;8"
      keyTimes="0;0.55;0.9;1"
      dur="8s"
      repeatCount="indefinite"
    />
    <animate
      attributeName="opacity"
      values="1;1;0;1;0;1"
      keyTimes="0;0.55;0.64;0.73;0.82;1"
      dur="8s"
      repeatCount="indefinite"
    />
  </rect>
</svg>
