<!--
  EDITING QUICK REFERENCE

  Each project is one <g class="project-row"> block.

  ADD A PROJECT
  1. Duplicate an entire project-row block.
  2. Give it a unique id.
  3. Increase translate(0 Y) by 40:
       Project 1: translate(0 0)
       Project 2: translate(0 40)
       Project 3: translate(0 80)
  4. Increase the final viewBox value using:
       190 + (project count - 1) * 40

     Examples:
       1 project  -> viewBox="0 0 1000 190"
       2 projects -> viewBox="0 0 1000 230"
       3 projects -> viewBox="0 0 1000 270"

  CHANGE A STATUS
    class="status-active"          text="ACTIVE"
    class="status-second-priority" text="SECOND PRIORITY"
    class="status-paused"          text="PAUSED"

  CHANGE PROGRESS
    Each completed segment represents 10%.
    Add the corresponding segment commands to a progress-filled path,
    then update the percentage text. See the examples beside the row below.

  There is no project limit. The bottom frame follows the viewBox height.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 190" role="img" aria-labelledby="title description">
  <title id="title">Working on projects</title>
  <desc id="description">Current project status and progress</desc>

  <style>
    /* Typography */
    .text {
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-weight: 700;
    }

    .title {
      fill: #a8d090;
      font-size: 20px;
    }

    .label {
      fill: #78a870;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .value {
      fill: #c6d8c3;
      font-size: 16px;
    }

    .muted {
      fill: #78a870;
      font-size: 14px;
    }

    /* Status themes */
    .status-active {
      --status-color: #78a870;
      --status-text-color: #a8d090;
    }

    .status-second-priority {
      --status-color: #d6b85a;
      --status-text-color: #e2cd83;
    }

    .status-paused {
      --status-color: #c65f5f;
      --status-text-color: #dc8585;
    }

    .status-fill {
      fill: var(--status-color);
    }

    .status-stroke {
      stroke: var(--status-color);
    }

    .status-text {
      fill: var(--status-text-color);
    }

    /* Progress bar */
    .progress-frame,
    .progress-segment,
    .progress-filled {
      fill: none;
    }

    .progress-frame {
      stroke: #456c4c;
      stroke-width: 1;
    }

    .progress-segment {
      stroke: #78a870;
      stroke-width: 1;
      opacity: .35;
    }

    .progress-filled {
      stroke: #a8d090;
      stroke-width: 2;
      opacity: 1;
    }

    /* Structural lines */
    .accent-line {
      fill: none;
      stroke: #5f9368;
      stroke-width: 2;
    }

    .divider {
      stroke: #456c4c;
      stroke-width: 1;
    }
  </style>

  <!-- Reusable components -->
  <defs>
    <g id="progress-track">
      <path class="progress-frame" d="M0 0H194 M0-4V4 M194-4V4"/>
      <path
        class="progress-segment"
        d="M3 0H17 M22 0H36 M41 0H55 M60 0H74 M79 0H93
           M98 0H112 M117 0H131 M136 0H150 M155 0H169 M174 0H191"
      />
    </g>
  </defs>

  <!-- Decorative frame -->
  <path class="accent-line" d="M18 32V14H246"/>

  <!-- Anchored automatically to the bottom of the current viewBox. -->
  <svg x="0" y="100%" width="1000" height="0" overflow="visible">
    <path class="accent-line" d="M754-14H982V-32"/>
  </svg>

  <!-- Header -->
  <circle cx="42" cy="34" r="4" fill="#a8d090"/>
  <text class="text title" x="58" y="41">WORKING ON PROJECTS</text>

  <text class="text label" x="58" y="82">PROJECT</text>
  <text class="text label" x="307" y="82">STATUS</text>
  <text class="text label" x="508" y="82">PROGRESS</text>
  <text class="text label" x="812" y="82">NEXT STEP</text>

  <line class="divider" x1="58" y1="99" x2="942" y2="99"/>

  <!--
    PROJECT ROWS

    Duplicate the complete block below to add a project.
    Keep every id unique and follow the translate/viewBox guide above.
  -->

  <!-- Project 1 -->
  <g id="project-clic" class="project-row" transform="translate(0 0)">
    <!-- Project name -->
    <text class="text value" x="58" y="133">clic</text>

    <!-- Status: status-active | status-second-priority | status-paused -->
    <g class="status-active">
      <circle class="status-fill" cx="311" cy="127" r="5"/>
      <circle class="status-stroke" cx="311" cy="127" r="9" fill="none" stroke-width="1" opacity=".45"/>
      <text class="text value status-text" x="329" y="133">PAUSED</text>
    </g>

    <!-- Progress track -->
    <use href="#progress-track" x="508" y="126"/>

    <!--
      Completed progress segments:
        10%: M3 0H17
        20%: M3 0H17 M22 0H36
        30%: M3 0H17 M22 0H36 M41 0H55

      Continue with the segment coordinates defined in #progress-track.
      For 0%, leave this group empty.
    -->
    <g class="completed-progress" transform="translate(508 126)">
      <path class="progress-filled" d="M3 0H17 M22 0H36"/>
    </g>
    <text class="text muted" x="716" y="131">20%</text>

    <!-- Next step -->
    <text class="text value" x="812" y="133">Another refactor</text>
  </g>
</svg>

