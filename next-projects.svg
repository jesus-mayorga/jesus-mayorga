<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="190" viewBox="0 0 1000 190" role="img" aria-labelledby="title description">
  <title id="title">Working on projects</title>
  <desc id="description">Current project status and progress</desc>

  <style>
    .text {
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-weight: 700;
    }

    .title {
      fill: #a8d090;
      font-size: 20px;
    }

    .label {
      fill: #78a870;
      font-size: 13px;
      letter-spacing: 1px;
    }

    .value {
      fill: #c6d8c3;
      font-size: 16px;
    }

    .muted {
      fill: #78a870;
      font-size: 14px;
    }

    .status-active .status-fill {
      fill: #78a870;
    }

    .status-active .status-stroke {
      stroke: #78a870;
    }

    .status-active .status-text {
      fill: #a8d090;
    }

    .status-second-priority .status-fill {
      fill: #d6b85a;
    }

    .status-second-priority .status-stroke {
      stroke: #d6b85a;
    }

    .status-second-priority .status-text {
      fill: #e2cd83;
    }

    .status-paused .status-fill {
      fill: #c65f5f;
    }

    .status-paused .status-stroke {
      stroke: #c65f5f;
    }

    .status-paused .status-text {
      fill: #dc8585;
    }

    .progress-frame {
      fill: none;
      stroke: #456c4c;
      stroke-width: 1;
    }

    .progress-segment {
      stroke: #78a870;
      stroke-width: 1;
      opacity: .35;
    }

    .progress-filled {
      stroke: #a8d090;
      stroke-width: 2;
      opacity: 1;
    }
  </style>

  <path d="M18 32V14H246" fill="none" stroke="#5f9368" stroke-width="2"/>
  <path d="M754 176H982V158" fill="none" stroke="#5f9368" stroke-width="2"/>

  <circle cx="42" cy="34" r="4" fill="#a8d090"/>
  <text class="text title" x="58" y="41">WORKING ON PROJECTS</text>

  <text class="text label" x="58" y="82">PROJECT</text>
  <text class="text label" x="307" y="82">STATUS</text>
  <text class="text label" x="508" y="82">PROGRESS</text>
  <text class="text label" x="812" y="82">NEXT STEP</text>

  <line x1="58" y1="99" x2="942" y2="99" stroke="#456c4c" stroke-width="1"/>

  <text class="text value" x="58" y="133">clic</text>

  <!--
    STATUS MANUAL

    Change only the class of the group and the text inside it:

    ACTIVE:
      class="status-active"
      text: ACTIVE

    SECOND PRIORITY:
      class="status-second-priority"
      text: SECOND PRIORITY

    PAUSED:
      class="status-paused"
      text: PAUSED
  -->
  <g id="project-status" class="status-paused">
    <circle class="status-fill" cx="311" cy="127" r="5"/>
    <circle class="status-stroke" cx="311" cy="127" r="9" fill="none" stroke-width="1" opacity=".45"/>
    <text class="text value status-text" x="329" y="133">PAUSED</text>
  </g>

  <!--
    PROGRESS MANUAL

    Each line represents 10 percent. Add the class "progress-filled"
    to the segments that should appear completed and update the percentage.
  -->
  <g id="project-progress" transform="translate(508 126)">
    <path class="progress-frame" d="M0 0H194"/>
    <path class="progress-frame" d="M0-4V4M194-4V4"/>

    <g fill="none">
      <path class="progress-segment" d="M3 0H17"/>
      <path class="progress-segment" d="M22 0H36"/>
      <path class="progress-segment" d="M41 0H55"/>
      <path class="progress-segment" d="M60 0H74"/>
      <path class="progress-segment" d="M79 0H93"/>
      <path class="progress-segment" d="M98 0H112"/>
      <path class="progress-segment" d="M117 0H131"/>
      <path class="progress-segment" d="M136 0H150"/>
      <path class="progress-segment" d="M155 0H169"/>
      <path class="progress-segment" d="M174 0H191"/>
    </g>
  </g>
  <text id="progress-value" class="text muted" x="716" y="131">0%</text>

  <text class="text value" x="812" y="133">Initialize</text>
</svg>
